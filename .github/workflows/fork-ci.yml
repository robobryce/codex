# Lean CI for the robobryce/codex fork.
#
# The upstream rust-ci / rust-ci-full workflows depend on self-hosted runners
# (`<repo>-linux-x64-xl`, `-linux-arm64`), paid macOS runners, a nightly
# argument-comment-lint toolchain, and protected signing environments — none of
# which exist on a fork. This workflow runs the standard fmt / clippy / build /
# test gates for the crates touched by the plugin-bundled-agents work on the
# free `ubuntu-latest` runners so changes are verifiable here.
name: fork-ci

on:
  push:
    branches: ["main"]
  pull_request: {}
  workflow_dispatch: {}

# Prefer the system git CLI for Cargo fetches (matches upstream).
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always
  # codex-rs tests recurse deeply; upstream sets the same value.
  RUST_MIN_STACK: "8388608"

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Pin to the repo's rust-toolchain.toml (1.95.0) and add the components
      # the gates need.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-fork-ci-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fork-ci-

      # CI uses the same invocation as scripts/format.py / upstream rust-ci.
      - name: cargo fmt
        run: cargo fmt -- --config imports_granularity=Item --check

      - name: cargo clippy (touched crates)
        run: cargo clippy -p codex-plugin -p codex-core-plugins -p codex-core --all-targets

      # Gating signal: the plugin-bundled-agents tests are deterministic and
      # must always pass.
      - name: cargo test (plugin-bundled-agents)
        env:
          RUST_MIN_STACK: "8388608"
        run: |
          cargo test -p codex-plugin --lib effective_plugin_agent_roots
          cargo test -p codex-core-plugins --lib plugin_agent_roots
          cargo test -p codex-core-plugins --lib agents_path
          cargo test -p codex-core-plugins --lib resolves_agents_path
          cargo test -p codex-core --lib plugin_agent_role_tests
          cargo test -p codex-core --lib plugin_bundled_agent_role

      # Broader lib-test coverage over the touched crates. Scoped to --lib
      # on purpose: codex-core's integration suites (tests/suite/{rmcp_client,
      # tools, unified_exec, ...}) require sandbox primitives (bwrap/landlock)
      # and live MCP servers that aren't available on a stock GitHub runner, so
      # they are not a meaningful signal here. A couple of lib tests are
      # timing/signal-flaky on shared runners (e.g. SIGTERM cleanup), so retry.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest (touched crates lib tests, with retries)
        env:
          RUST_MIN_STACK: "8388608"
        run: |
          cargo nextest run --lib --retries 2 --no-fail-fast \
            -p codex-plugin -p codex-core-plugins -p codex-core

  # Smoke-build the release binary so a broken release build is caught on PRs,
  # not only when a tag is pushed.
  build-smoke:
    name: release build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    # The codex-rs release build (v8, codex-tui) peaks above the ~7 GB RAM of a
    # free runner and gets OOM-killed (exit 143) compiling codex-tui. Same
    # mitigation as fork-release: cap parallelism, drop debuginfo, add swap.
    env:
      CARGO_BUILD_JOBS: "2"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
      CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: "off"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Free disk space and enlarge swap
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo swapoff -a || true
          sudo fallocate -l 8G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libssl-dev
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-fork-build-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fork-build-
      - name: cargo build --release --bin codex
        run: cargo build --release --bin codex
