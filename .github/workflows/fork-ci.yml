# Lean CI for the robobryce/codex fork.
#
# The upstream rust-ci / rust-ci-full workflows depend on self-hosted runners
# (`<repo>-linux-x64-xl`, `-linux-arm64`), paid macOS runners, a nightly
# argument-comment-lint toolchain, and protected signing environments — none of
# which exist on a fork. This workflow runs the standard fmt / clippy / build /
# test gates for the crates touched by the plugin-bundled-agents work on the
# free `ubuntu-latest` runners so changes are verifiable here.
name: fork-ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request: {}
  workflow_dispatch: {}

# Prefer the system git CLI for Cargo fetches (matches upstream).
env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: always
  # codex-rs tests recurse deeply; upstream sets the same value.
  RUST_MIN_STACK: "8388608"

concurrency:
  group: fork-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Pin to the repo's rust-toolchain.toml (1.95.0) and add the components
      # the gates need.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libssl-dev

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-fork-ci-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fork-ci-

      # CI uses the same invocation as scripts/format.py / upstream rust-ci.
      - name: cargo fmt
        run: cargo fmt -- --config imports_granularity=Item --check

      - name: cargo clippy (touched crates)
        run: cargo clippy -p codex-plugin -p codex-core-plugins -p codex-core --all-targets

      # Gating signal: the plugin-bundled-agents tests are deterministic and
      # must always pass.
      - name: cargo test (plugin-bundled-agents)
        env:
          RUST_MIN_STACK: "8388608"
        run: |
          cargo test -p codex-plugin --lib effective_plugin_agent_roots
          cargo test -p codex-core-plugins --lib plugin_agent_roots
          cargo test -p codex-core-plugins --lib agents_path
          cargo test -p codex-core-plugins --lib resolves_agents_path
          cargo test -p codex-core --lib plugin_agent_role_tests
          cargo test -p codex-core --lib plugin_bundled_agent_role

      # Broader coverage over the touched crates. A couple of upstream tests are
      # timing/signal-flaky on shared runners (e.g. SIGTERM cleanup), so retry
      # via nextest rather than letting a flake fail the run.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo nextest (touched crates, with retries)
        env:
          RUST_MIN_STACK: "8388608"
        run: |
          cargo nextest run --retries 2 --no-fail-fast \
            -p codex-plugin -p codex-core-plugins -p codex-core

  # Smoke-build the release binary so a broken release build is caught on PRs,
  # not only when a tag is pushed.
  build-smoke:
    name: release build (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            pkg-config libssl-dev
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: ${{ runner.os }}-fork-build-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fork-build-
      - name: cargo build --release --bin codex
        run: cargo build --release --bin codex
